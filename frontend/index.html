<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TravelBlog AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ===== HEADER ===== -->
  <header id="header">
    <button id="btn-back" class="header-btn hidden" aria-label="Назад">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1 id="header-title">TravelBlog AI</h1>
    <div class="header-actions">
      <button id="btn-history" class="header-btn" aria-label="История" title="История">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5-4H6m-2.95 0V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-favorites" class="header-btn" aria-label="Избранное" title="Избранное">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== LIMIT BAR ===== -->
  <div id="limit-bar">
    <span id="limit-text">14 / 14</span>
    <div id="limit-track"><div id="limit-fill"></div></div>
  </div>

  <!-- ===== SCREEN: PLACES ===== -->
  <section id="screen-places" class="screen active">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="search" type="text" placeholder="Поиск места..." autocomplete="off" />
    </div>
    <div id="places-grid"></div>
  </section>

  <!-- ===== SCREEN: CONFIG ===== -->
  <section id="screen-config" class="screen">
    <div id="selected-place" class="place-hero"></div>

    <div class="config-group">
      <label class="config-label">Тип контента</label>
      <div class="chips" data-group="contentType">
        <button class="chip" data-value="post">📝 Пост</button>
        <button class="chip" data-value="guide">🗺️ Гид</button>
        <button class="chip" data-value="review">💬 Отзыв</button>
        <button class="chip" data-value="stories">📱 Сторис</button>
        <button class="chip" data-value="image">🖼️ Изображение</button>
      </div>
    </div>

    <div class="config-group">
      <label class="config-label">Стиль</label>
      <div class="chips" data-group="style">
        <button class="chip" data-value="romantic">💕 Романтичный</button>
        <button class="chip" data-value="family">👨‍👩‍👧 Семейный</button>
        <button class="chip" data-value="extreme">⚡ Экстрим</button>
        <button class="chip" data-value="budget">💰 Бюджетный</button>
      </div>
    </div>

    <div class="config-group">
      <label class="config-label">Аудитория</label>
      <div class="chips" data-group="audience">
        <button class="chip" data-value="couple">💑 Пара</button>
        <button class="chip" data-value="family">👨‍👩‍👧‍👦 Семья</button>
        <button class="chip" data-value="solo">🧳 Solo</button>
      </div>
    </div>

    <div class="config-group">
      <label class="config-label">Язык</label>
      <div class="chips" data-group="language">
        <button class="chip" data-value="ru">Русский</button>
        <button class="chip" data-value="en">English</button>
      </div>
    </div>

    <button id="btn-generate" class="btn-primary">🚀 Сгенерировать</button>
  </section>

  <!-- ===== SCREEN: RESULT ===== -->
  <section id="screen-result" class="screen">
    <div id="result-meta" class="result-meta"></div>
    <div id="result-image-wrap" class="result-image-wrap hidden">
      <img id="result-image" class="result-image" alt="Generated image" />
    </div>
    <div id="result-content" class="result-content"></div>
    <div class="result-actions">
      <button id="btn-copy" class="action-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg> Копировать</button>
      <button id="btn-download" class="action-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Скачать</button>
      <button id="btn-share" class="action-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" stroke="currentColor" stroke-width="2"/></svg> Поделиться</button>
      <button id="btn-fav" class="action-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg> В избранное</button>
    </div>
    <button id="btn-new" class="btn-secondary">Сгенерировать ещё</button>
  </section>

  <!-- ===== SCREEN: HISTORY ===== -->
  <section id="screen-history" class="screen">
    <h2 class="screen-title">История генераций</h2>
    <div id="history-list" class="card-list"></div>
    <div id="history-empty" class="empty-state hidden">
      <p>Пока пусто. Сгенерируйте первый контент!</p>
    </div>
  </section>

  <!-- ===== SCREEN: FAVORITES ===== -->
  <section id="screen-favorites" class="screen">
    <h2 class="screen-title">Избранное</h2>
    <div id="favorites-list" class="card-list"></div>
    <div id="favorites-empty" class="empty-state hidden">
      <p>Добавьте результаты в избранное ⭐</p>
    </div>
  </section>

  <!-- ===== LOADING OVERLAY ===== -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p id="loading-text">Генерируем контент...</p>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

</div>

<script src="script.js"></script>
</body>
</html>
